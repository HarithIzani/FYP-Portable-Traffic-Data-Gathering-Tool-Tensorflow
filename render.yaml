services:
  - type: web
    name: traffic-detection-api
    env: python
    region: singapore        # closest to Malaysia; change to frankfurt/oregon if preferred
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
